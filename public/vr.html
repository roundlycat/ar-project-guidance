<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>WebXR AR HUD</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
  
  <!-- A-Frame Library for Native WebXR & 3D Rendering -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; 
    }
    
    /* The overlay must cover the screen but let clicks pass through to A-Frame if needed */
    #hud-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        z-index: 10; display: flex; flex-direction: column; 
        justify-content: center; align-items: center; 
        pointer-events: none; 
    }
    
    /* Targeting Reticle */
    .reticle { 
        width: 60px; height: 60px; 
        border: 2px solid rgba(0, 229, 255, 0.4); border-radius: 50%; 
        display: flex; align-items: center; justify-content: center; 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2), inset 0 0 10px rgba(0, 229, 255, 0.2);
    }
    
    .reticle::after { 
        content: ''; width: 6px; height: 6px; 
        background: #00e5ff; border-radius: 50%; 
        box-shadow: 0 0 8px #00e5ff;
    }
    
    /* Telemetry Display */
    .telemetry-dashboard { 
        position: absolute; bottom: 30px; 
        background: rgba(10, 15, 25, 0.75); backdrop-filter: blur(5px);
        padding: 12px 24px; border: 1px solid rgba(0, 229, 255, 0.3); 
        border-radius: 12px; text-align: center; color: #ececec;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .temp-readout { font-size: 1.8rem; font-weight: 600; color: #00e5ff; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
    .state-readout { font-size: 0.85rem; color: #8ab89a; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

    .warning-banner {
        position: absolute; top: 30px;
        color: #ff5555; border: 1px solid #ff5555; background: rgba(50,0,0,0.5);
        padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
        display: none; animation: flash 2s infinite;
    }

    @keyframes flash {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    .connection-badge {
        position: absolute; top: 10px; left: 10px;
        font-family: 'Outfit', sans-serif; font-size: 0.7rem;
        padding: 3px 10px; border-radius: 12px;
        background: rgba(0,0,0,0.6); color: #888;
        border: 1px solid rgba(255,255,255,0.1);
        z-index: 20;
        transition: all 0.3s ease;
    }
    .connection-badge.connected { color: #00e5ff; border-color: rgba(0,229,255,0.3); }
    .connection-badge.reconnecting { color: #ffd166; border-color: rgba(255,209,102,0.3); animation: flash 1.5s infinite; }
    
    /* A hidden video element to keep the CV pipeline alive if getUserMedia still works */
    #cv-video { display: none; }
  </style>
</head>
<body>

<!-- A-Frame Scene configured for WebXR AR mode with Passthrough and DOM Overlay -->
<a-scene 
    webxr="optionalFeatures: dom-overlay; overlayElement: #hud-overlay" 
    background="transparent: true"
    renderer="alpha: true"
    vr-mode-ui="enterVRButton: #enter-ar-btn; enterARButton: #enter-ar-btn">
    
    <!-- Camera -->
    <a-entity camera position="0 1.6 0"></a-entity>
    
    <!-- 3D Entities will be dynamically injected here later -->
    <a-entity id="wireframe-layer"></a-entity>
</a-scene>

<!-- Custom Enter AR Button -->
<button id="enter-ar-btn" style="position: absolute; bottom: 40%; left: 50%; transform: translateX(-50%); z-index: 100; padding: 16px 32px; background: #00e5ff; color: #000; border: none; border-radius: 24px; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 20px rgba(0,229,255,0.4);">
    Enter AR Passthrough
</button>

<!-- HUD Overlay (This whole div gets projected over the AR view) -->
<div id="hud-overlay">
  <div class="connection-badge" id="conn-badge">LINKING...</div>
  <div class="warning-banner">LINK SEVERED</div>
  
  <div class="wireframe-container" id="2d-wireframes" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
  
  <div class="reticle"></div>
  
  <div class="telemetry-dashboard">
    <div class="temp-readout"><span class="temp">--</span>°C</div>
    <div class="state-readout">Establishing Uplink...</div>
  </div>
</div>

<video id="cv-video" autoplay playsinline muted></video>

<script>
  let savedPiIp = localStorage.getItem('pi_ip') || window.location.hostname;
  
  // Hide the enter button once we actually enter AR
  document.querySelector('a-scene').addEventListener('enter-vr', function () {
     document.getElementById('enter-ar-btn').style.display = 'none';
  });
  document.querySelector('a-scene').addEventListener('exit-vr', function () {
     document.getElementById('enter-ar-btn').style.display = 'block';
  });

  async function bootOptics() {
    try {
      const constraints = { video: { facingMode: { ideal: "environment" } } };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      const vid = document.getElementById('cv-video');
      vid.srcObject = stream;
      try { await vid.play(); } catch(err) { console.warn("Auto-play suppressed", err); }
    } catch(e) { 
        console.warn("Optics Boot Failure (expected if Quest blocks it in browser):", e.message); 
    }
  }
  
  async function syncTelemetry() {
    try {
      const isCloudHost = window.location.hostname !== 'localhost' && !window.location.hostname.startsWith('192.168.');
      const backendUrl = isCloudHost ? `https://${savedPiIp}:9500` : '';
    
      const res = await fetch(`${backendUrl}/api/proxy/ecology?ip=${savedPiIp}`);
      if (!res.ok) throw new Error("Gateway proxy unlinked");
      const data = await res.json();
      
      document.querySelectorAll('.temp').forEach(el => el.textContent = data.temperature ? data.temperature.toFixed(1) : '--');
      document.querySelectorAll('.state-readout').forEach(el => {
          el.textContent = data.system_state || 'Nominal';
          el.style.color = '#8ab89a';
      });
      document.querySelectorAll('.warning-banner').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.reticle').forEach(el => el.style.borderColor = 'rgba(0, 229, 255, 0.4)');
    } catch(e) {
      document.querySelectorAll('.state-readout').forEach(el => { el.textContent = "SIGNAL LOST"; el.style.color = '#ff5555'; });
      document.querySelectorAll('.warning-banner').forEach(el => el.style.display = 'block');
      document.querySelectorAll('.reticle').forEach(el => el.style.borderColor = 'rgba(255, 85, 85, 0.4)');
    }
  }

  let activeTargetIndex = 0;
  let componentCache = [];
  let dpadPressed = false;

  let latestTracking = [];
  let trackingWs = null;
  let wsReconnectTimer = null;
  let wsReconnectAttempts = 0;
  const MAX_RECONNECT_ATTEMPTS = 20;

  function connectTrackingWs() {
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      try {
          trackingWs = new WebSocket(`${wsProtocol}//${window.location.host}/ws/tracking`);
      } catch (e) {
          console.warn('WS connection failed:', e);
          scheduleReconnect();
          return;
      }

      trackingWs.onopen = () => {
          console.log('Tracking WS connected');
          wsReconnectAttempts = 0;
          updateConnectionBadge('connected', 'LINKED');
      };

      trackingWs.onmessage = (event) => {
          try {
              const data = JSON.parse(event.data);
              if (data && data.components) {
                  latestTracking = data.components;
              }
          } catch (e) {
              console.error("WS parse error", e);
          }
      };

      trackingWs.onclose = () => {
          console.warn('Tracking WS closed');
          updateConnectionBadge('reconnecting', 'RECONNECTING...');
          scheduleReconnect();
      };

      trackingWs.onerror = () => {
          updateConnectionBadge('reconnecting', 'WS ERROR');
      };
  }

  function scheduleReconnect() {
      if (wsReconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
          updateConnectionBadge('', 'LINK FAILED');
          return;
      }
      const delay = Math.min(1000 * Math.pow(1.5, wsReconnectAttempts), 30000);
      wsReconnectAttempts++;
      clearTimeout(wsReconnectTimer);
      wsReconnectTimer = setTimeout(connectTrackingWs, delay);
  }

  function updateConnectionBadge(cls, text) {
      const el = document.getElementById('conn-badge');
      if (el) { el.className = 'connection-badge ' + cls; el.textContent = text; }
  }

  connectTrackingWs();

  // Xbox Controller / Gamepad API Integration & Haptics
  function pollGamepad() {
      const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
      const gp = Array.from(gamepads).find(g => g !== null);
      
      if (gp && componentCache.length > 0) {
          const rightPush = gp.buttons[15]?.pressed || gp.buttons[5]?.pressed;
          const leftPush = gp.buttons[14]?.pressed || gp.buttons[4]?.pressed;
          
          if ((rightPush || leftPush) && !dpadPressed) {
              if (rightPush) activeTargetIndex = (activeTargetIndex + 1) % componentCache.length;
              if (leftPush) activeTargetIndex = (activeTargetIndex - 1 + componentCache.length) % componentCache.length;
              
              dpadPressed = true;
              renderWireframeCache();
          } else if (!rightPush && !leftPush) {
              dpadPressed = false;
          }

          const targetedComp = componentCache[activeTargetIndex];
          if (targetedComp && gp.vibrationActuator) {
              const trackingHit = latestTracking.find(t => t.label === targetedComp.label);
              if (trackingHit) {
                  let semanticMag = Math.min(Math.max(trackingHit.semantic_drift || 0, 0), 1.0);
                  let spatialMag = Math.min(Math.max(trackingHit.spatial_drift || 0, 0), 1.0);

                  if (semanticMag > 0.1 || spatialMag > 0.1) {
                      try {
                          gp.vibrationActuator.playEffect("dual-rumble", {
                              startDelay: 0, duration: 50, 
                              strongMagnitude: semanticMag, 
                              weakMagnitude: spatialMag     
                          });
                      } catch(e) {}
                  }
              }
          }
      }
      requestAnimationFrame(pollGamepad);
  }

  function renderWireframeCache() {
      if (!componentCache || componentCache.length === 0) return;
      
      // Map 2D predictions to the 2D DOM overlay. 
      // In a full 3D future, we'd spawn <a-box> entities, but DOM overlay is robust!
      const pw = window.innerWidth;
      const ph = window.innerHeight;
      
      const wireframeHTML = componentCache.map((comp, idx) => {
          const box = comp.box || { xmin: 0.1, ymin: 0.1, xmax: 0.3, ymax: 0.3 };
          
          const left = box.xmin * 100;
          const top = box.ymin * 100;
          const width = (box.xmax - box.xmin) * 100;
          const height = (box.ymax - box.ymin) * 100;
          
          const isTargeted = (idx === activeTargetIndex);
          const color = isTargeted ? '#00e5ff' : '#a78bfa';
          const bg = isTargeted ? 'rgba(0, 229, 255, 0.2)' : 'rgba(167, 139, 250, 0.05)';
          const zIndex = isTargeted ? 100 : 1;
          const borderStyle = isTargeted ? 'solid' : 'dashed';
          
          return `
            <div style="position: absolute; left: ${left}%; top: ${top}%; width: ${width}%; height: ${height}%; 
                        border: 2px ${borderStyle} ${color}; background: ${bg}; z-index: ${zIndex}; transition: all 0.2s ease;">
                <div style="position:absolute; top:-25px; left:0; color:${color}; font-size:12px; white-space:nowrap; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px;">
                   ${isTargeted ? '▶ TARGET: ' : ''}${comp.label || comp.type || 'Unknown Component'}
                </div>
            </div>
          `;
      }).join('');
      
      document.getElementById('2d-wireframes').innerHTML = wireframeHTML;
  }

  function captureInternalFrame() {
      const video = document.getElementById('cv-video');
      if (!video || !video.videoWidth) return null;
      
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      return canvas.toDataURL('image/jpeg', 0.8).split(',')[1]; 
  }

  let hasPromptedKey = false;
  async function syncGhostWireframes() {
    try {
      let apiKey = localStorage.getItem('gemini_api_key');
      if (!apiKey || apiKey.trim() === '') {
          if (hasPromptedKey) return;
          hasPromptedKey = true;
          apiKey = prompt("VR OPTICS BOOT:\nPlease enter your Gemini API Key to enable autonomous Client-Side AR Vision:");
          if (apiKey) localStorage.setItem('gemini_api_key', apiKey.trim());
          else return;
      }
      
      const b64Image = captureInternalFrame();
      if (!b64Image) return; 
      
      const res = await fetch(`/api/camera/analyse`, {
          method: 'POST',
          headers: { 
              'Content-Type': 'application/json',
              'x-gemini-key': apiKey 
          },
          body: JSON.stringify({ image_base64: b64Image })
      });
      
      if (!res.ok) throw new Error(`Client Vision Sync Failed: ${res.status}`);
      const data = await res.json();
      
      if (data && data.components && data.components.length > 0) {
          componentCache = data.components;
          if (activeTargetIndex >= componentCache.length) activeTargetIndex = 0;
          renderWireframeCache();
      }
    } catch(e) {
        console.warn("Autonomous Ghost Mode Warning:", e);
    }
  }
  
  window.addEventListener("gamepadconnected", (e) => {
      console.log("XBOX CONTROLLER LINKED:", e.gamepad.id);
      document.querySelectorAll('.state-readout').forEach(el => el.textContent += " + GAMEPAD");
  });

  bootOptics();
  pollGamepad();
  setInterval(syncTelemetry, 2000);
  setInterval(syncGhostWireframes, 5000);

  window.addEventListener('beforeunload', () => {
      clearTimeout(wsReconnectTimer);
      if (trackingWs) trackingWs.close();
  });
</script>

</body>
</html>
